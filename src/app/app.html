<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened class="sidenav">

    <div class="menu-titulo">
      <h2>Menu</h2>
    </div>

    <mat-nav-list>

      <!-- Loja de Jogos -->
      <a mat-list-item routerLink="/jogos" routerLinkActive="ativo" ariaCurrentWhenActive="page">

        <mat-icon>sports_esports</mat-icon>
        <span>Jogos</span>

      </a>


      <!-- Jogos do usuário -->
      <a mat-list-item routerLink="/meus-jogos" routerLinkActive="ativo" ariaCurrentWhenActive="page">

        <mat-icon>gamepad</mat-icon>
        <span>Meus Jogos</span>

      </a>

      <!-- Perfil -->
      <a mat-list-item routerLink="/perfil" routerLinkActive="ativo" ariaCurrentWhenActive="page">

        <mat-icon>account_circle</mat-icon>
        <span>Meu Perfil</span>

      </a>

      <a mat-list-item (click)="logout()" class="logout-item">

        <mat-icon>logout</mat-icon>

        <span>Sair</span>

      </a>




    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary" class="toolbar">

      <span>{{ title() }}</span>

      <span class="spacer"></span>



    </mat-toolbar>

    <main class="conteudo">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
