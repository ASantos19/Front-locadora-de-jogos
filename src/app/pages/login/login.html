<mat-card class="login-card">

  <mat-card-header>
    <mat-card-title>
      Locadora de Jogos
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>

      <input matInput type="email" [(ngModel)]="email">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Senha</mat-label>

      <input matInput [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="password">

      <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">

        <mat-icon>
          {{ hidePassword ? 'visibility_off' : 'visibility' }}
        </mat-icon>

      </button>
    </mat-form-field>

    @if (erro) {
    <p class="erro">
      {{ erro }}
    </p>
    }

  </mat-card-content>

  <mat-card-actions>

    <button mat-raised-button color="primary" (click)="entrar()">
      Entrar
    </button>

    <p>
      Não possui conta?
      <a routerLink="/cadastro">
        Criar conta
      </a>
    </p>

  </mat-card-actions>


</mat-card>
