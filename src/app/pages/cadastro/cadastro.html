<mat-card class="cadastro-card">

  <mat-card-header>
    <mat-card-title>
      Criar Conta
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <mat-form-field appearance="outline">
      <mat-label>Apelido</mat-label>

      <input
        matInput
        [(ngModel)]="apelido">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>

      <input
        matInput
        type="email"
        [(ngModel)]="email">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Senha</mat-label>

      <input
        matInput
        type="password"
        [(ngModel)]="password">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Confirmar senha</mat-label>

      <input
        matInput
        type="password"
        [(ngModel)]="confirmarSenha">
    </mat-form-field>

    @if (erro) {
      <p class="erro">
        {{ erro }}
      </p>
    }

  </mat-card-content>

  <mat-card-actions>

    <button
      mat-raised-button
      color="primary"
      (click)="cadastrar()">

      Cadastrar

    </button>

  </mat-card-actions>

  <mat-card-footer>

    <p>
      Já possui conta?
      <a routerLink="/login">
        Entrar
      </a>
    </p>

  </mat-card-footer>

</mat-card>
